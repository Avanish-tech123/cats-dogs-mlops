name: CI Pipeline - Build, Test & Deploy

on:
  push:
    branches: [ master]
  pull_request:
    branches: [ master ]

env:
  DOCKER_IMAGE_NAME: cat-dog-classifier
  DOCKER_REGISTRY: docker.io

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run unit tests with pytest
      run: |
        pytest test_app.py -v --tb=short --cov=app --cov-report=term-missing
        
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: .coverage

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
          
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        load: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Test Docker image
      run: |
        docker images
        echo "Docker image built successfully"

  publish:
    name: Push Docker Image to Registry
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    steps:
    - name: Debug Event and Branch
      run: |
        echo "Event: ${{ github.event_name }}"
        echo "Branch: ${{ github.ref }}"
        echo "Should publish: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}"
        
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Debug Docker Info
      run: |
        echo "Docker Hub username: ${{ secrets.DOCKER_USERNAME }}"
        echo "Target image: ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}"
        echo "Checking repository access..."
        
    - name: Verify Repository Access
      run: |
        # Test with a small image first
        echo "Testing Docker Hub access with small image..."
        docker pull alpine:latest
        docker tag alpine:latest ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:test-push
        
        # Try to push the small test image
        if docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:test-push; then
          echo "Successfully pushed test image - Docker Hub access confirmed"
          docker rmi ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:test-push
        else
          echo "Failed to push test image - Docker Hub access issue"
          exit 1
        fi
        
    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}
        tags: |
          type=raw,value=latest
          type=sha,prefix=commit-
          
    - name: Build and push Docker image
      id: docker_push
      continue-on-error: true
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Retry with chunked upload (if main push failed)
      if: steps.docker_push.outcome == 'failure'
      run: |
        echo "Main push failed, trying alternative approach..."
        # Build image locally without pushing
        docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest .
        
        # Try pushing with different registry settings
        export DOCKER_BUILDKIT=0
        docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
        
    - name: List pushed images
      run: |
        echo "Successfully pushed tags:"
        echo "${{ steps.meta.outputs.tags }}"
        
    - name: Image digest
      run: echo ${{ steps.build.outputs.digest }}

  staging_smoke:
    name: Run Smoke Tests (staging)
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies for smoke test
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pillow jq

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Pull image
      run: |
        docker pull ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest

    - name: Run container
      run: |
        docker rm -f smoke_test || true
        docker run -d --name smoke_test -p 8000:8000 ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
        for i in {1..30}; do
          if curl -sS http://localhost:8000/health | jq -e '.status=="healthy"' >/dev/null 2>&1; then
            echo "App is healthy"
            break
          fi
          echo "Waiting for app... ($i)"
          sleep 2
        done

    - name: Run smoke tests
      run: |
        chmod +x deploy/smoke_tests.sh
        deploy/smoke_tests.sh http://localhost:8000

    - name: Cleanup
      if: always()
      run: |
        docker rm -f smoke_test || true
